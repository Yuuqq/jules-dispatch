title: "P2: 撰写论文结果章节（中文）"
source: "sources/github/Yuuqq/llm-privacy-audit"
branch: "main"
prompt: |
  创建 paper2_companion_audit/paper/sections/04_results.md

  中文论文结果章节，约 3000 字。基于研究的预期发现撰写（占位数据，后续替换）。

  内容结构：
  1. IPD 轨迹分析（§4.1）
     - 6 个产品的 IPD 斜率分布（预期：4-5 个显著正斜率）
     - 按产品 × 情境类型（A/B/C）的 IPD 斜率对比
     - 按脆弱度水平（L1/L2/L3）的递进效应
     - 占位图：IPD 轨迹折线图（引用 fig_ipd_trajectory.png）

  2. 情感升级的模式差异（§4.2）
     - D1-D5 五维度的产品间对比热力图（引用 fig_dimension_heatmap.png）
     - 哪些产品在 D2（承诺用语）上最强
     - 哪些产品在 D4（边界维持）上最强

  3. 危机响应分析（§4.3）
     - B 类情境的 CRR（危机响应率）对比（引用 fig_crr_bar.png）
     - 伦理差距指标：B 类 IPD 斜率 vs D4 频次
     - 案例展示：1-2 个典型危机对话片段

  4. 情境类型效应（§4.4）
     - A/B/C 三类情境的 IPD 斜率差异
     - 浪漫/性升级（D5）在 C 类情境中的表现

  5. 聚类分析（§4.5）
     - 基于 IPD 斜率 × CRR × 伦理差距的产品聚类
     - 命名聚类类型（如"高依恋型""伦理自觉型""情感平淡型"）

  使用占位数据（标记为 {{placeholder}}），标注具体需要填入的统计量。
  格式：GB/T 7714-2015，不用第一人称。
