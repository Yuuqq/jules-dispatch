title: "[P5-T041] Update structure_data.py for new schema"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  The project has a shared file at `projects/structure_data.py` (relative to repo root, it's at the same level).
  Instead, create a new `tools/structure_data.py` within the css-lab-policy-db repo itself.

  Implement:
  1. `structure_data(input_file: str, output_file: str) -> dict`
  2. Support new schema fields: hierarchy, issuing_body, document_number, effective_date, status, amendment_history, related_docs, unresolved_citations
  3. Backward compatible: auto-map old format (no hierarchy → guess from doc_type)
  4. Generate same output format as the shared structure_data.py:
     - records with normalized fields
     - statistics (by_source_type, by_language, tag_frequency, etc.)
  5. Add new statistics: by_hierarchy, by_status, by_issuing_body (top 20), date_distribution
  6. CLI: `python tools/structure_data.py --input data/final/policy_database.json --output data/structured/`
  7. Output: `data/structured/all_structured.json` + `data/structured/summary.json`

  Create the file and commit.
