# Phase 5: Integration & Docs — 6 tasks
---
title: "[P5-T039] Master collection orchestrator"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `scripts/run_all.py` — master orchestrator that runs the entire pipeline sequentially.

  Pipeline steps:
  1. Phase 1: Run all domain FLK collection scripts (5 scripts)
  2. Phase 2: Run all domain GOV.CN collection scripts (5 scripts)
  3. Phase 3: Run all ministry collection scripts (5 scripts)
  4. Phase 4a: Deduplicate → clean → enrich → tag → link → quality check
  5. Phase 4b: Generate statistics
  6. Final: Merge into `data/final/policy_database.json`

  Requirements:
  - Each step prints progress: "[Step 3/11] Deduplicating... found 1200 docs"
  - Any step failure is logged but doesn't stop the pipeline
  - Generate `reports/run_report.json` with:
    ```json
    {
      "started_at": "...",
      "completed_at": "...",
      "steps": [
        {"name": "flk_data_security", "status": "success", "docs": 45, "duration_s": 120},
        ...
      ],
      "final_count": 800,
      "errors": []
    }
    ```
  - CLI: `python scripts/run_all.py [--skip-collect] [--skip-clean]`
  - `--skip-collect` skips Phase 1-3 (for re-running pipeline on existing data)

  Create the file and commit.
