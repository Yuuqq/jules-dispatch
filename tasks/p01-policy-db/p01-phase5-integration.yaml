title: "[P5-T042] End-to-end pipeline test"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `tests/test_pipeline.py` — end-to-end test for the full data pipeline.

  Test flow using fixture data:
  1. Load test fixtures from tests/fixtures/*.json
  2. Run schema validation → assert all valid fixtures pass, invalid ones fail
  3. Run text cleaning → assert HTML removed, whitespace normalized
  4. Run deduplication → assert duplicates removed
  5. Run metadata extraction → assert issuing_body extracted
  6. Run auto-tagging → assert domain assigned
  7. Run quality check → assert score > 0
  8. Run statistics generation → assert all dimensions present

  Use pytest. Each test function tests one pipeline step.
  Use `tests/fixtures/` data, not real HTTP requests.
  All tests must pass with `pytest tests/test_pipeline.py -v`.

  Create the file and commit.
