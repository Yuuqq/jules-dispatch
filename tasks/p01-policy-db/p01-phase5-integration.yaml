title: "[P5-T040] Delta update mechanism"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `scripts/run_delta.py` — incremental update that only collects new documents.

  Implement:
  1. Load existing `data/final/policy_database.json` (if exists)
  2. Load all checkpoint files from `data/**/checkpoint.json`
  3. Determine last collection date per source
  4. Run collection scripts with date filter (only since last collection)
  5. Merge new documents into existing database (no deletions)
  6. Re-run dedup + clean + enrich + tag on new documents only
  7. Output delta report: `reports/delta_report.json`
     ```json
     {
       "previous_count": 800,
       "new_collected": 15,
       "after_dedup": 12,
       "final_count": 812,
       "new_sources": ["flk_data_security: 5", "govcn_environmental: 7"]
     }
     ```
  8. CLI: `python scripts/run_delta.py`

  Create the file and commit.
