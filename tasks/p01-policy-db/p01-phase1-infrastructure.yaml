title: "[P1-T006] Build FLK collection orchestrator"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `scrapers/flk_collector.py` — orchestrator that ties search + detail + validation together.

  Implement class `FLKCollector`:
  1. `__init__(self, output_dir: str = "data/flk/raw")`
  2. `collect(self, keywords: list[str], category: str = None) -> dict`
     - For each keyword: search → get detail for each result → validate against schema → save
  3. Checkpoint mechanism: save collected URLs to `data/flk/checkpoint.json`
  4. Resume: skip URLs already in checkpoint
  5. Save results to `data/flk/raw/{category}_{keyword}_{timestamp}.json`
  6. On completion, print stats: total_found, success, failed, skipped (already collected)
  7. Return summary dict with counts

  Dependencies: uses flk_search.py, flk_detail.py, validate.py (import from tools/)

  Create the file and commit.
