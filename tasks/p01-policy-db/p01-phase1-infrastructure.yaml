title: "[P1-T004] Build FLK search API client"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `scrapers/flk_search.py` — search client for 国家法律法规数据库 (flk.npc.gov.cn).

  Implement class `FLKSearcher`:
  1. `__init__(self, rate_limit: float = 2.0)` — rate limit in seconds between requests
  2. `search(self, keyword: str, category: str = None, page: int = 1) -> list[dict]`
     - category: one of "法律", "行政法规", "地方法规", "司法解释", or None for all
     - Returns list of dicts: {title, url, publish_date, category, source_id}
  3. `search_all_pages(self, keyword: str, category: str = None) -> list[dict]`
     - Auto-paginate through all results
  4. Use `requests` or `httpx` for HTTP
  5. Add proper User-Agent header
  6. Rate limiting: `time.sleep(rate_limit)` between requests
  7. Retry on 5xx errors (max 3 retries with exponential backoff)
  8. Logging via Python logging module

  Also create `scrapers/__init__.py` (empty).
  Also create `scrapers/requirements.txt`: requests, httpx, beautifulsoup4, lxml

  Create unit tests in `tests/test_flk_search.py` using unittest.mock to mock HTTP responses.

  Create all files and commit.
