title: "[P1-T005] Build FLK detail page parser"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `scrapers/flk_detail.py` — detail page parser for flk.npc.gov.cn law pages.

  Implement function `parse_law_detail(url: str) -> dict | None`:
  1. Fetch the URL
  2. Parse HTML with BeautifulSoup
  3. Extract: title, full_text (complete law text), issuing_body, document_number, publish_date, effective_date, status
  4. full_text must be the COMPLETE legal text, not truncated
  5. Handle encoding: auto-detect GBK/UTF-8
  6. Return None if parsing fails (log the error, don't raise)
  7. Return dict matching the schema in schema/policy_document.json

  Also implement `parse_law_detail_from_html(html: str) -> dict | None` for testing without HTTP.

  Create tests in `tests/test_flk_detail.py` with sample HTML fixtures.
  Create `tests/fixtures/flk_sample_page.html` — a sample law page HTML (can be synthetic/realistic).

  Create all files and commit.
