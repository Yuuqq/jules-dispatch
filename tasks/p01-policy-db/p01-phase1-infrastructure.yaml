# Phase 1: Infrastructure — 10 tasks
# Target: https://github.com/Yuuqq/css-lab-policy-db
---
title: "[P1-T001] Create policy document JSON Schema"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `schema/policy_document.json` — a JSON Schema (Draft 2020-12) for policy documents.

  Required fields (15+):
  - doc_id (string, pattern: "^[A-Z]{2,4}-CN-\d{4}-\d{4}$")
  - title (string, minLength: 2)
  - full_text (string, minLength: 50)
  - source (string, enum: ["国家法律法规数据库", "中国政府网", "北大法宝", "网信办", "生态环境部", "住建部", "自然资源部", "市场监管总局", "Exa搜索", "其他"])
  - source_url (string, format: uri)
  - doc_type (string, enum: ["法律", "行政法规", "部门规章", "司法解释", "规范性文件", "其他"])
  - issuing_body (string)
  - document_number (string, e.g. "中华人民共和国主席令第八十四号")
  - publish_date (string, format: date)
  - effective_date (string, format: date, nullable)
  - status (string, enum: ["现行有效", "尚未施行", "已废止", "已被修改", "部分失效"])
  - hierarchy (string, enum: ["宪法", "法律", "行政法规", "部门规章", "地方政府规章", "规范性文件", "司法解释"])
  - domain (array of strings, items from: ["数据安全", "AI治理", "环境治理", "城市治理", "公地治理", "平台治理", "其他"])
  - keywords (array of strings, maxItems: 20)
  - collection_date (string, format: date)
  - collection_method (string, enum: ["flk_scraper", "govcn_scraper", "exa_search", "manual", "ministry_scraper"])

  Optional fields:
  - related_docs (array of strings)
  - amendment_history (array of objects with version/date/change)
  - text_length (integer)
  - summary (string)

  Create the file and commit. Do NOT modify any existing files.
---
title: "[P1-T002] Create Schema validation CLI tool"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `tools/validate.py` — a CLI tool that validates JSON data files against the policy document schema.

  Requirements:
  1. Load schema from `schema/policy_document.json`
  2. Accept command: `python tools/validate.py <data_file.json>` or `python tools/validate.py <directory>`
  3. For each record in the data file, validate against schema
  4. Print: total records, passed, failed
  5. For failed records, print: record index, field name, error message
  6. Exit code: 0 if all pass, 1 if any fail
  7. Handle encoding (UTF-8/GBK auto-detect)

  Also create test fixtures:
  - `tests/fixtures/valid_law.json` — 1 valid policy doc (数据安全法)
  - `tests/fixtures/valid_regulation.json` — 1 valid regulation (行政法规)
  - `tests/fixtures/invalid_missing_field.json` — missing required field
  - `tests/fixtures/invalid_wrong_type.json` — wrong type for doc_type
  - `tests/fixtures/invalid_enum.json` — enum value not in allowed list

  Add `requirements.txt` with: jsonschema>=4.0

  Create the files and commit.
---
