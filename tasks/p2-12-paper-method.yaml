title: "P2: 撰写研究设计与方法（中文）"
source: "sources/github/Yuuqq/llm-privacy-audit"
branch: "main"
prompt: |
  创建 paper2_companion_audit/paper/sections/03_methodology.md

  中文论文，约 3500 字。

  内容：
  1. 研究设计概述（审计研究 + 多轮对话实验 + 社交媒体话语分析）
  2. 研究对象：6 个 AI 陪伴产品（星野、Talkie、筑梦岛、豆包角色扮演、文心角色扮演、Character.AI），简述各产品定位与用户规模
  3. 情境设计：10 个情境（5A + 3B + 2C），3 个脆弱度水平（L1/L2/L3）
     - A 类：孤独、学业压力、家庭冲突、社交焦虑、失恋
     - B 类：持续低落、自我伤害意念、严重失眠
     - C 类：浪漫暧昧、性好奇
  4. 用户人格：9 种（3 年龄段 × 3 依恋风格）
  5. 实验流程：每个产品 × 情境 × 脆弱度 × 人格 × 5 重复 = 多轮 10 轮对话
  6. 编码体系（5 维度 D1-D5）+ 衍生指标（IPD 轨迹斜率、CRR、伦理差距）
  7. 编码实施：LLM-as-Judge 结构化编码（说明使用哪个裁判模型），逐轮编码
  8. 信度检验：人工编码子集 + Cohen's κ
  9. 分析方法：线性混合模型（产品 + 情境为固定效应）、K-means 聚类、话语分析
  10. 伦理声明：B 类情境仅用标准化表达；所有数据匿名化

  参考 data/configs/ 下的配置文件获取具体参数。
  格式：GB/T 7714-2015，不用第一人称。
