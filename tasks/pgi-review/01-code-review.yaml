  - artifacts/api-server/src/lib/errors.ts
  - artifacts/api-server/src/lib/pagination.ts
  - artifacts/api-server/src/lib/convert-context.ts

  Check for:
  - PipelineDispatcher: does dispatch() use Promise.allSettled? Is handler error isolation correct?
  - Semantic ID: collision handling robustness, workspace scoping correctness
  - Validate middleware: does it properly replace req.body/req.params with parsed values?
  - Error codes: are they consistent, unique, and documented?
  - Pagination: cursor generation — can cursors be forged to access other users data?
  - Any mutation, deep nesting, or any type

  Create REVIEW-code-lib-arch.md. Include file:line. Do NOT modify source code.
