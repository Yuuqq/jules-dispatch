---
title: "[Code Review] API Routes — workspaces, papers, graph"
prompt: |
  You are a senior code reviewer. Review ONLY the following files for code quality issues:
  - artifacts/api-server/src/routes/workspaces.ts
  - artifacts/api-server/src/routes/papers.ts
  - artifacts/api-server/src/routes/graph.ts

  Check for:
  - Mutation of parameters or state (should use immutable patterns)
  - Functions longer than 50 lines or nesting deeper than 3 levels
  - Hardcoded values that should be constants
  - console.log statements left in production code
  - Error handling gaps (missing try/catch, unhandled promise rejections)
  - Inconsistent naming conventions
  - Missing or incorrect TypeScript types (any usage)

  Create a file REVIEW-code-routes.md with your findings organized as:
  ## CRITICAL (must fix before merge)
  ## HIGH (should fix)
  ## MEDIUM (nice to fix)
  ## LOW (optional improvement)

  For each finding, include the file path with line number and a clear explanation.
  If no issues found in a severity level, write "None found."
  Do NOT modify any source code — only create the review markdown file.
