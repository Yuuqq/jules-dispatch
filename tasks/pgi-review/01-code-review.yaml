title: "[Code Review] API Lib — cache, retry, extraction, recovery"
prompt: |
  You are a senior code reviewer. Review ONLY the following files for code quality:
  - artifacts/api-server/src/lib/cache.ts
  - artifacts/api-server/src/lib/retry.ts
  - artifacts/api-server/src/lib/extraction.ts
  - artifacts/api-server/src/lib/recovery.ts

  Check for:
  - Mutation of parameters or state (should use immutable patterns)
  - Race conditions in async code (concurrent cache access, recovery duplicate guard)
  - Functions longer than 50 lines or nesting deeper than 3 levels
  - Error handling: does recovery truly never throw? Does retry correctly classify errors?
  - Cache: is the CacheProvider interface properly abstracted? Can it swap to Redis?
  - Extraction: is the OpenAI response parsing robust against all malformed inputs?
  - Any use of any type

  Create REVIEW-code-lib-core.md. Include file:line for each finding. Do NOT modify source code.
