title: "[Code Review] E2E Tests and Playwright Config"
prompt: |
  You are a senior code reviewer. Review ONLY the following files for code quality:
  - e2e/global-setup.ts
  - e2e/global-teardown.ts
  - e2e/fixtures/index.ts
  - playwright.config.ts
  - e2e/*.spec.ts (all spec files in e2e/)

  Check for:
  - Global setup: proper Clerk auth handling, cleanup on failure
  - Playwright config: correct webServer config, timeout values, retry strategy
  - Test fixtures: are they reusable? Do they leak state between tests?
  - Spec files: proper test isolation, meaningful assertions, no flaky waits
  - Are test IDs (data-testid) stable across semantic ID migration?
  - Missing error scenarios or edge cases

  Create REVIEW-code-e2e.md. Include file:line. Do NOT modify source code.
