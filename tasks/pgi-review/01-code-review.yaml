title: "[Code Review] API Lib — pipeline, semantic-id, validate, errors, pagination"
prompt: |
  You are a senior code reviewer. Review ONLY the following files for code quality:
  - artifacts/api-server/src/lib/pipeline-dispatcher.ts
  - artifacts/api-server/src/lib/pipeline-events.ts
  - artifacts/api-server/src/lib/pipeline-consumers.ts
  - artifacts/api-server/src/lib/semantic-id.ts
