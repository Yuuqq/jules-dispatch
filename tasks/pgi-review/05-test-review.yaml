---
title: "[Test Review] API server unit tests — coverage gaps"
prompt: |
  You are a test quality reviewer. Audit the API server unit tests:

  Files to review:
  - artifacts/api-server/src/__tests__/*.test.ts (all test files)

  Check for:
  - Are all requirement scenarios covered (happy path, edge cases, error handling)?
  - Are mocks too tightly coupled to implementation (testing implementation, not behavior)?
  - Missing test cases: empty inputs, null values, boundary conditions
  - Are status transitions fully covered in extraction tests?
  - Is the cache test coverage complete (hit, miss, TTL, invalidation, clear)?
  - Are there any skipped tests (.skip)?
  - Test isolation: can tests run independently in any order?
  - Coverage gaps: which production files have no corresponding test file?

  Create REVIEW-test-api-unit.md with findings. Include file:line. Do NOT modify source code.
---
title: "[Test Review] Route integration tests — coverage completeness"
prompt: |
  You are a test quality reviewer. Audit the route integration tests:

  Files to review:
  - artifacts/api-server/src/__tests__/routes.test.ts
  - artifacts/api-server/src/__tests__/test-app.test.ts

  Check for:
  - Does every route have at least one integration test?
  - Are error responses tested (400, 401, 403, 404, 500)?
  - Is pagination tested for all paginated endpoints?
  - Is the validation middleware tested with invalid inputs?
  - Are workspace ownership boundaries tested?
  - Is SSE streaming tested end-to-end?
  - Are edge cases tested: empty workspace, non-existent IDs, invalid formats?

  Create REVIEW-test-routes.md with findings. Include file:line. Do NOT modify source code.
