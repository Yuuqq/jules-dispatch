title: "[Test Review] Frontend component tests — mock quality"
prompt: |
  You are a test quality reviewer. Audit the frontend component and hook tests:

  Files to review:
  - artifacts/scholarmind/src/__tests__/*.test.tsx (all test files)
  - artifacts/scholarmind/src/mocks/ (MSW handlers used in tests)

  Check for:
  - Do component tests use MSW handlers instead of vi.mock?
  - Are loading and error states tested?
  - Is the graph rendering tested (ReactFlow components)?
  - Is the worker layout tested (message protocol)?
  - Are user interactions tested (click, type, submit)?
  - Are hooks tested independently (useLayoutWorker, custom hooks)?
  - Do MSW handlers produce realistic mock data?

  Create REVIEW-test-frontend.md with findings. Include file:line. Do NOT modify source code.
---
title: "[Test Review] E2E tests — reliability and coverage"
prompt: |
  You are a test quality reviewer. Audit the E2E tests:

  Files to review:
  - e2e/*.spec.ts (all spec files)
  - playwright.config.ts
  - e2e/global-setup.ts
  - e2e/fixtures/index.ts

  Check for:
  - Are critical user journeys covered (auth, import, graph, chat)?
  - Are assertions specific (not just "page is visible")?
  - Timeouts: are they reasonable? Too short = flaky, too long = slow CI
  - Retry strategy: is retries: 2 appropriate for CI?
  - Test data cleanup: do tests clean up after themselves?
  - Parallel safety: can all tests run in parallel without interference?
  - Missing scenarios: error states, edge cases, offline behavior
  - Are there MSW-backed E2E tests for deterministic CI?

  Create REVIEW-test-e2e.md with findings. Include file:line. Do NOT modify source code.
---
title: "[Test Review] MSW handler contract tests — schema parity"
prompt: |
  You are a test quality reviewer. Audit the MSW contract tests:

  Files to review:
  - artifacts/scholarmind/src/mocks/__tests__/schema-contract.test.ts (if exists)
  - artifacts/scholarmind/src/mocks/handlers/*.ts
  - lib/api-zod/src/generated/api.ts

  Check for:
  - Does every handler response pass its Zod schema .parse()?
  - Are all scenarios tested (default, empty, error)?
  - Is the schema contract test CI-blocking?
  - Can the contract test become circular (schema validates itself)?
  - Are there route-contract tests against the real Express app?
  - If a schema changes, will the contract test catch the drift?

  Create REVIEW-test-msw-contract.md with findings. Include file:line. Do NOT modify source code.
