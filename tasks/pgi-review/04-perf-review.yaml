---
title: "[Perf Review] Cache implementation and invalidation matrix"
prompt: |
  You are a performance reviewer. Audit the cache system:

  Files to review:
  - artifacts/api-server/src/lib/cache.ts
  - artifacts/api-server/src/lib/pipeline-consumers.ts
  - All route files that use cacheGet/cacheInvalidate

  Check for:
  - Is the invalidation matrix complete? Every GET cache key must have corresponding mutation invalidation
  - Are cache keys properly scoped (userId, workspaceId) to prevent cross-user leakage?
  - TTL values: are they appropriate? (too short = wasted, too long = stale data)
  - Cache stampede: can concurrent misses cause duplicate DB queries?
  - Memory usage: what is max memory with 500 entries of typical graph data?
  - Multi-instance: is the CacheProvider interface truly swappable?
  - Does extraction completion properly invalidate graph/stats/papers caches?

  Create REVIEW-perf-cache.md with findings. Include file:line. Do NOT modify source code.
---
title: "[Perf Review] Dagre Web Worker — cancellation, stale guard, fallback"
prompt: |
  You are a performance reviewer. Audit the Web Worker layout system:

  Files to review:
  - artifacts/scholarmind/src/workers/layout-worker.ts
  - artifacts/scholarmind/src/pages/workspaces/graph/useLayoutWorker.ts

  Check for:
  - Stale response guard: does the requestId mechanism work correctly?
  - Worker termination: is the worker cleaned up on component unmount?
  - Memory: does the worker hold references to large objects after posting results?
  - Rapid layout changes: if computeLayout is called 10 times quickly, does only the last result apply?
  - Error handling: what happens if dagre.layout() throws inside the worker?
  - Fallback: if worker fails, does the UI show a fallback or just hang?
  - Transfer: does the worker use transferable objects for large data?

  Create REVIEW-perf-worker.md with findings. Include file:line. Do NOT modify source code.
---
title: "[Perf Review] ReactFlow virtualization and memoization"
prompt: |
  You are a performance reviewer. Audit the graph rendering:

  Files to review:
  - artifacts/scholarmind/src/pages/workspaces/graph/index.tsx
  - artifacts/scholarmind/src/pages/workspaces/graph/EntityNode.tsx
  - artifacts/scholarmind/src/pages/workspaces/graph/KnowledgeEdge.tsx

  Check for:
  - Is onlyRenderVisibleElements actually set and effective?
  - Are nodeTypes and edgeTypes defined outside render (stable references)?
  - EntityNode: is React.memo effective? Does it have a custom comparator?
  - KnowledgeEdge: is React.memo effective for edges?
  - Are there any inline object/function creations in render that break memoization?
  - Node/edge creation: is useMemo used correctly for nodes/edges arrays?
  - For 200+ nodes: will the current approach maintain 60fps?
  - Does setNodes/setEdges cause unnecessary re-renders?

  Create REVIEW-perf-graph.md with findings. Include file:line. Do NOT modify source code.
---
title: "[Perf Review] Bundle size, lazy loading, code splitting"
prompt: |
  You are a performance reviewer. Audit the frontend bundle:

  Files to review:
  - artifacts/scholarmind/vite.config.ts
  - artifacts/scholarmind/src/App.tsx
  - artifacts/scholarmind/src/main.tsx
  - artifacts/scholarmind/package.json
  - package.json (root)

  Check for:
  - Are route components lazy-loaded (React.lazy + Suspense)?
  - Is the dagre library code-split (only loaded when graph page is visited)?
  - Is the OpenAI/integration code excluded from the frontend bundle?
  - Are there any large dependencies imported eagerly that should be dynamic?
  - Is tree-shaking effective (check for barrel imports that may prevent it)?
  - Are there duplicate dependencies (same lib in multiple bundles)?
  - What is the estimated total bundle size (JS + CSS)?

  Create REVIEW-perf-bundle.md with findings. Include file:line. Do NOT modify source code.
