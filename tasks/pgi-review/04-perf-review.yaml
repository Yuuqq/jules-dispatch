title: "[Perf Review] DB query patterns — N+1, indexing, joins"
prompt: |
  You are a performance reviewer. Audit database query patterns:

  Files to review:
  - artifacts/api-server/src/routes/workspaces.ts (stats endpoint)
  - artifacts/api-server/src/routes/papers.ts
  - artifacts/api-server/src/routes/graph.ts
  - artifacts/api-server/src/routes/chat.ts
  - lib/db/src/schema/*.ts (all schema files for indexes)

  Check for:
  - N+1 queries: any loops that make individual DB queries per item?
  - Missing indexes: columns used in WHERE/JOIN that lack indexes
  - Over-fetching: SELECT * when only a few columns are needed
  - Stats endpoint: are 6+ separate queries merged into efficient queries?
  - Graph endpoint: are entity+relation fetches using parallel queries?
  - Pagination: does cursor-based pagination use indexed columns?
  - Large result sets: are there unbounded queries that could return millions of rows?

  Create REVIEW-perf-db.md with findings. Include file:line. Do NOT modify source code.
---
title: "[Perf Review] Retry utility and backoff strategy"
prompt: |
  You are a performance reviewer. Audit the retry utility:

  Files to review:
  - artifacts/api-server/src/lib/retry.ts

  Check for:
  - Backoff timing: is 1s/2s/4s appropriate for OpenAI API calls?
  - Error classification: are 429/500/503 correctly identified as retryable?
  - Can retry cause duplicate work? (e.g., double entity creation after partial success)
  - Is retry scoped correctly? (only around the OpenAI call, not DB writes)
  - Max attempts: is 3 appropriate? What happens on the 4th attempt?
  - Custom isRetryable: can it be overridden safely?
  - Timer precision: is fake timer testing reliable?

  Create REVIEW-perf-retry.md with findings. Include file:line. Do NOT modify source code.
---
title: "[Perf Review] Pipeline Dispatcher overhead and concurrency"
prompt: |
  You are a performance reviewer. Audit the pipeline dispatcher:

  Files to review:
  - artifacts/api-server/src/lib/pipeline-dispatcher.ts
  - artifacts/api-server/src/lib/pipeline-events.ts
  - artifacts/api-server/src/lib/pipeline-consumers.ts

  Check for:
  - Memory: does the Map of handlers grow unbounded? Can old handlers be cleaned up?
  - Concurrency: what happens if dispatch is called while a previous dispatch is still running?
  - Promise.allSettled: is the overhead acceptable for synchronous handlers?
  - Event listener leak: does on() without matching off() leak memory?
  - Singleton: is the pipeline instance safe across multiple requests?
  - Error boundary: does one handler failure properly log without affecting others?

  Create REVIEW-perf-dispatcher.md with findings. Include file:line. Do NOT modify source code.
