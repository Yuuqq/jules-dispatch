title: "[Func Review] Workspace CRUD — create, list, get, update, delete"
prompt: |
  You are a functional reviewer. Verify the workspace CRUD feature works correctly by reviewing:

  Files to review:
  - artifacts/api-server/src/routes/workspaces.ts
  - lib/db/src/schema/workspaces.ts

  Verify these behaviors:
  - POST /api/workspaces creates a workspace with correct ownerId from auth
  - GET /api/workspaces returns only workspaces owned by the authenticated user
  - GET /api/workspaces/:id returns workspace details only if user owns it
  - PATCH /api/workspaces/:id updates name/description only if user owns it
  - DELETE /api/workspaces/:id deletes and all cascading data only if user owns it
  - GET /api/workspaces/:id/stats returns correct paper/entity/relation counts
  - Unauthenticated requests return 401
  - Non-owner requests return 403 or empty
  - Pagination works correctly (cursor-based)

  Create REVIEW-func-workspaces.md listing each behavior as PASS/FAIL/UNCLEAR with evidence.
  Do NOT modify source code.
