title: "P03: Weibo governance policy history (2018-2026)"
source: "sources/github/Yuuqq/css-lab-platform-governance"
branch: "main"
prompt: |
  Expand `data/微博_policies.json` with a policy timeline of Weibo (微博) governance rules from 2018 to 2026.

  Collect at least 5 policy updates:
  1. Weibo community convention (微博社区公约)
  2. Weibo content review rules (内容审核规范)
  3. Weibo hot search management (热搜管理规则)
  4. Weibo fan circle regulation (饭圈治理规则)
  5. Weibo advertising rules (广告管理规范)

  For each: `policy_name`, `platform`: "微博", `version`, `effective_date`, `policy_type`, `content_summary`, `key_changes_from_previous`, `source_url`, `collection_date`

  Search the web. Commit: "feat: Weibo governance policy timeline 2018-2026"
