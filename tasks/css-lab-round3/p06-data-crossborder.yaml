title: "P06: Sentiment - cross-border data flow debate collection"
source: "sources/github/Yuuqq/css-lab-sentiment-analysis"
branch: "main"
prompt: |
  Create a new sentiment dataset for "cross-border data flow" (数据出境) debate.

  File: `data/cross_border_data_debate.json`

  Collect discussions about:
  1. Data export security assessment (数据出境安全评估) opinions
  2. DIDI data security case public reaction
  3. Standard contract for cross-border data (标准合同) feedback
  4. TikTok data sovereignty debates globally

  At least 50 records. Structure same as existing sentiment files.
  Include `sentiment_label`, `key_arguments`, `stakeholder_type`, `time_period`.

  Search the web. Commit: "feat: cross-border data flow sentiment dataset"
