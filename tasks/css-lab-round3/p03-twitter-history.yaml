title: "P03: Twitter/X governance policy history (2018-2026)"
source: "sources/github/Yuuqq/css-lab-platform-governance"
branch: "main"
prompt: |
  Expand `data/Twitter_X_policies.json` with a comprehensive policy timeline from 2018 to 2026.

  Collect major policy changes across these categories:
  1. Content moderation policy evolution (pre-Musk vs post-Musk)
  2. Hateful conduct policy updates
  3. Misinformation/deceptive posts policy
  4. Verification/blue tick policy changes
  5. API access and developer policy changes
  6. Political advertising rules

  For each: `policy_name`, `platform`: "Twitter/X", `version`, `effective_date`, `policy_type`, `content_summary` (200-500 chars), `key_changes_from_previous`, `source_url`, `collection_date`

  Search the web. Commit: "feat: Twitter/X governance policy timeline 2018-2026"
