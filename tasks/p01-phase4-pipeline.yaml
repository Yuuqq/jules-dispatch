title: "[P4-T038] Data export tool"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `tools/export_data.py` — export policy database to multiple formats.

  Implement:
  1. `export_csv(input_file: str, output_dir: str)` — flatten nested fields, output CSV
     - Flatten: domain → "domain_1;domain_2", keywords → "kw1;kw2;kw3"
  2. `export_tsv(input_file: str, output_dir: str)` — same as CSV but tab-separated
  3. `export_bibtex(input_file: str, output_dir: str)` — legal citation format
     - @legislation{key, title={...}, author={issuing_body}, year={2021}, note={document_number}, ...}
  4. CLI: `python tools/export_data.py --input data/linked/merged.json --format csv --output data/export/`
  5. Support --format all for all three formats
  6. Print: records exported, file sizes

  Create the file and commit.
