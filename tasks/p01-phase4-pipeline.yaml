title: "[P4-T033] Metadata extraction tool"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `tools/extract_metadata.py` — extract structured metadata from full_text using regex.

  Implement:
  1. `extract_issuing_body(text: str) -> str` — e.g. "全国人民代表大会常务委员会"
  2. `extract_document_number(text: str) -> str` — e.g. "中华人民共和国主席令第八十四号"
  3. `extract_effective_date(text: str) -> str` — e.g. "本法自2021年9月1日起施行"
  4. `extract_amendments(text: str) -> list[dict]` — e.g. "根据2023年修正"
  5. `enrich_document(doc: dict) -> dict` — apply all extractors, fill missing fields
  6. `enrich_file(input_file: str, output_file: str) -> dict`
  7. CLI: `python tools/extract_metadata.py --input data/cleaned/merged.json --output data/enriched/merged.json`
  8. Print: fields enriched count (e.g. "issuing_body: +120, effective_date: +85")

  Create the file and commit.
