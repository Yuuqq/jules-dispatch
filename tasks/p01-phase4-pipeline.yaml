# Phase 4: Data Pipeline — 8 tasks
---
title: "[P4-T031] Document deduplication tool"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `tools/deduplicate.py` — deduplicate policy documents by URL and title similarity.

  Implement:
  1. `deduplicate(input_files: list[str], output_file: str) -> dict`
  2. Phase 1: Exact URL dedup (remove duplicates, keep first occurrence)
  3. Phase 2: Title fuzzy dedup using simhash (similarity ≥ 0.9 → merge, keep more complete record)
  4. For merged records, keep all source URLs in a "source_urls" field
  5. Input: glob pattern like "data/**/*.json"
  6. Output: single merged file, e.g. "data/dedup/merged.json"
  7. Print: "Before: 1200 | After URL dedup: 1150 | After fuzzy dedup: 1100 | Removed: 100"
  8. Return stats dict

  CLI: `python tools/deduplicate.py --input "data/**/*.json" --output data/dedup/merged.json`

  Add simhash or similar to requirements.

  Create the file and commit.
---
title: "[P4-T032] Text cleaning pipeline"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `tools/clean_text.py` — clean and normalize policy text.

  Implement:
  1. `clean_text(text: str) -> str` — single document cleaner
  2. `clean_file(input_file: str, output_file: str) -> dict` — batch cleaner
  3. Cleaning steps:
     a. Remove HTML tags (if any remain)
     b. Normalize whitespace: multiple spaces/newlines → single
     c. Normalize quotes: ""'' → standard quotes
     d. Normalize Chinese punctuation: fullwidth/halfwidth consistency
     e. Preserve legal clause numbering format (第X条第X款第X项)
     f. Remove navigation text, breadcrumbs, page footers (common web artifacts)
     g. Strip leading/trailing whitespace
  4. Update text_length field after cleaning
  5. CLI: `python tools/clean_text.py --input data/dedup/merged.json --output data/cleaned/merged.json`
  6. Print: records processed, average text length before/after

  Create the file and commit.
