title: "[P4-T036] Data quality checker"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `tools/quality_check.py` — validate data completeness and quality.

  Implement:
  1. `check_completeness(doc: dict) -> dict` — check all 15 required fields present
  2. `check_full_text(doc: dict) -> dict` — check length ≥ 100 chars, not truncated
  3. `check_dates(doc: dict) -> dict` — check date format YYYY-MM-DD, logical order (effective ≥ publish)
  4. `run_quality_report(input_file: str, output_file: str) -> dict`
  5. Output `reports/quality_report.json`:
     ```json
     {
       "total": 800,
       "field_completeness": {"doc_id": 1.0, "full_text": 0.95, ...},
       "issues": [
         {"doc_id": "XXX", "field": "full_text", "issue": "text_length=45, below minimum 100"},
         ...
       ],
       "overall_score": 0.92
     }
     ```
  6. Print terminal summary with color-coded pass/warn/fail
  7. CLI: `python tools/quality_check.py --input data/linked/merged.json --output reports/quality_report.json`

  Create the file and commit.
