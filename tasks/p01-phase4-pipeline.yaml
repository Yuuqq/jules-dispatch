title: "[P4-T034] Domain keyword auto-tagger"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `tools/auto_tagger.py` — auto-tag documents with domain labels and keywords.

  Implement:
  1. `load_configs(config_dir: str = "configs/") -> dict[str, list[str]]` — load all YAML keyword configs
  2. `tag_document(doc: dict, configs: dict) -> tuple[list[str], list[str]]` — returns (domains, keywords)
  3. Domain matching: if text contains ≥ 3 keywords from a config → assign that domain
  4. Keyword extraction: TF-IDF top 10 terms from full_text, filtered against config keywords
  5. `tag_file(input_file: str, output_file: str, config_dir: str = "configs/") -> dict`
  6. CLI: `python tools/auto_tagger.py --input data/enriched/merged.json --output data/tagged/merged.json`
  7. Print: domain distribution, top keywords

  Add scikit-learn or jieba to requirements for TF-IDF/Chinese tokenization.
  Use jieba for Chinese text segmentation.

  Create the file and commit.
