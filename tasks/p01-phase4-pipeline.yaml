title: "[P4-T035] Related document linker"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `tools/link_related.py` — find related documents by cross-referencing legal citations.

  Implement:
  1. `extract_citations(text: str) -> list[str]` — extract patterns like "《中华人民共和国XX法》", "XX规定", "XX办法"
  2. `match_citations(citations: list[str], all_docs: list[dict]) -> list[dict]`
     - Match citation text against document titles (fuzzy match)
  3. `link_documents(input_file: str, output_file: str) -> dict`
     - For each doc, populate related_docs field with matched doc_ids
     - Unresolved citations stored in "unresolved_citations" field
  4. CLI: `python tools/link_related.py --input data/tagged/merged.json --output data/linked/merged.json`
  5. Print: total citations found, resolved count, unresolved count, top unresolved citations

  Create the file and commit.
