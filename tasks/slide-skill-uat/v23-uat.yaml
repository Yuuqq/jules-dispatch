title: "UAT — Phase 32: Bilingual Export (dual-language text layout)"
source: "sources/github/Yuuqq/slide-skill"
branch: "master"
prompt: |
  You are a QA tester performing acceptance testing on Phase 32 of the slide-skill project.

  ## Your Role
  Simulate a human tester verifying bilingual (Chinese + English) slide export. Do exploratory testing beyond unit tests.

  ## Project Setup
  1. Install the package:
     ```
     cd tools/slide && pip install -e ".[dev,pdf]"
     ```
  2. Run existing tests to confirm baseline:
     ```
     python -m pytest tests/test_bilingual.py -v
     ```

  ## Requirements to Verify (from ROADMAP.md)

  **BI-01**: SVG element with `data-bilingual="true"` containing Chinese and English `<text>` children → two PPTX text frames stacked vertically (Chinese above, English below)

  **BI-02**: Slide with `data-layout="side-by-side"` → Chinese text on LEFT, English text on RIGHT in exported PPTX

  **BI-03**: English text frame uses smaller font size than Chinese frame (e.g., 18pt vs 24pt), customizable via `data-lang-size` attribute

  **BI-04**: `_approx_w_in()` and `i18n.py` LanguageProfile use consistent CJK width factor (unified from 1.0 vs 1.8 mismatch)

  **BI-05**: Arabic/Hebrew text paired with English → correct RTL layout in PPTX bilingual text frames

  ## End-to-End Verification (CRITICAL)

  ### Test A: Stacked Bilingual (BI-01)
  Create `/tmp/test-bilingual-stacked.svg`:
  ```xml
  <svg xmlns="http://www.w3.org/2000/svg" width="960" height="540">
    <rect width="960" height="540" fill="#1a1a2e"/>
    <g data-bilingual="true">
      <text x="80" y="80" font-size="28" fill="#FFFFFF">人工智能与教育创新</text>
      <text x="80" y="120" font-size="20" fill="#CCCCCC">AI and Educational Innovation</text>
    </g>
  </svg>
  ```
  Export: `python -c "from slide_skill.exporter import render_pptx; render_pptx('/tmp/test-bilingual-stacked.svg', '/tmp/test-bilingual-stacked.pptx')"`
  Open the PPTX with python-pptx:
  ```python
  from pptx import Presentation
  prs = Presentation('/tmp/test-bilingual-stacked.pptx')
  for slide in prs.slides:
      for shape in slide.shapes:
          print(f"Shape: {shape.shape_type}, Name: {shape.name}")
          if shape.has_text_frame:
              for para in shape.text_frame.paragraphs:
                  print(f"  Text: {para.text}")
  ```
  **VERIFY**:
  - At least 2 text frames exist (one for Chinese, one for English)
  - Chinese text contains "人工智能与教育创新"
  - English text contains "AI and Educational Innovation"
  - Chinese frame is ABOVE English frame (check top/left positions)

  ### Test B: Side-by-Side Layout (BI-02)
  Create `/tmp/test-bilingual-sbs.svg` with `data-layout="side-by-side"`:
  ```xml
  <svg xmlns="http://www.w3.org/2000/svg" width="960" height="540">
    <rect width="960" height="540" fill="#1a1a2e"/>
    <g data-bilingual="true" data-layout="side-by-side">
      <text x="60" y="80" font-size="24" fill="#FFFFFF">中文内容</text>
      <text x="500" y="80" font-size="18" fill="#CCCCCC">English Content</text>
    </g>
  </svg>
  ```
  Export and inspect. **VERIFY**: Chinese frame's left position < English frame's left position.

  ### Test C: Custom Font Sizes (BI-03)
  Create `/tmp/test-bilingual-sizes.svg` with `data-lang-size="zh:20;en:14"`:
  ```xml
  <svg xmlns="http://www.w3.org/2000/svg" width="960" height="540">
    <rect width="960" height="540" fill="#1a1a2e"/>
    <g data-bilingual="true" data-lang-size="zh:20;en:14">
      <text x="80" y="80" font-size="24" fill="#FFFFFF">自定义字号中文</text>
      <text x="80" y="120" font-size="18" fill="#CCCCCC">Custom size English</text>
    </g>
  </svg>
  ```
  Export and inspect font sizes of both frames.
  **VERIFY**: Chinese frame font size = 20pt, English frame font size = 14pt.

  ### Test D: CJK Width Factor Consistency (BI-04)
  ```python
  from slide_skill.converters import approx_w_in
  from slide_skill.i18n import CJK_CHAR_WIDTH, LATIN_CHAR_WIDTH
  # Verify both use the same factor
  print(f"CJK factor: {CJK_CHAR_WIDTH}")
  print(f"Latin factor: {LATIN_CHAR_WIDTH}")
  cjk_w = approx_w_in("人工智能", 24)
  lat_w = approx_w_in("Artificial", 24)
  print(f"CJK '人工智能' width: {cjk_w}")
  print(f"Latin 'Artificial' width: {lat_w}")
  # CJK should be wider per character
  ```
  **VERIFY**: `CJK_CHAR_WIDTH` and the internal factor in `approx_w_in` are consistent (not one using 1.0 and another using 1.8).

  ### Test E: RTL Support (BI-05)
  Create `/tmp/test-bilingual-rtl.svg`:
  ```xml
  <svg xmlns="http://www.w3.org/2000/svg" width="960" height="540">
    <rect width="960" height="540" fill="#1a1a2e"/>
    <g data-bilingual="true">
      <text x="80" y="80" font-size="24" fill="#FFFFFF" dir="rtl">مرحبا بالعالم</text>
      <text x="80" y="120" font-size="18" fill="#CCCCCC">Hello World</text>
    </g>
  </svg>
  ```
  Export and check if PPTX opens without errors. Inspect text frame properties for RTL attributes if accessible.

  ## Report
  Write to `.planning/phases/32-bilingual-export/32-UAT-REPORT.md`:

  ```markdown
  # UAT Report: Phase 32 — Bilingual Export
  **Tester:** Jules (AI QA Agent)
  **Date:** <today>

  ## Summary
  <PASS / FAIL / PARTIAL>

  ## Per-Requirement Results

  | Req | Description | Result | Evidence |
  |-----|-------------|--------|----------|
  | BI-01 | Stacked bilingual frames | PASS/FAIL | <evidence> |
  | BI-02 | Side-by-side layout | PASS/FAIL | <evidence> |
  | BI-03 | Custom font sizes via data-lang-size | PASS/FAIL | <evidence> |
  | BI-04 | CJK width factor consistency | PASS/FAIL | <values found> |
  | BI-05 | RTL text support | PASS/FAIL | <evidence> |

  ## Issues Found
  <any bugs, unexpected behavior, or edge cases>

  ## Test Artifacts
  <list all generated files>
  ```

  Create the directory if it doesn't exist: `mkdir -p .planning/phases/32-bilingual-export`
  Commit the report file only. Do NOT modify any source code or existing tests.

