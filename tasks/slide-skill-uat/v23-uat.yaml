  | Req | Description | Result | Evidence |
  |-----|-------------|--------|----------|
  | PD-01 | 1-up PDF with notes | PASS/FAIL | <evidence> |
  | PD-02 | 2-up/3-up layout | PASS/FAIL | <evidence> |
  | PD-03 | Formatted notes (bold/italic/bullets) | PASS/FAIL | <evidence> |
  | PD-04 | Canvas preset aspect ratios | PASS/FAIL | <values> |
  | PD-05 | CJK text in PDF | PASS/FAIL | <evidence> |

  ## Additional Findings
  | Test | Description | Result | Notes |
  |------|-------------|--------|-------|
  | F | Empty notes handling | PASS/FAIL | |
  | G | Long notes handling | PASS/FAIL | |

  ## Issues Found
  <any bugs, unexpected behavior, or edge cases>

  ## Test Artifacts
  <list all generated files>
  ```

  Create the directory if it doesn't exist: `mkdir -p .planning/phases/33-pdf-handout-export`
  Commit the report file only. Do NOT modify any source code or existing tests.
