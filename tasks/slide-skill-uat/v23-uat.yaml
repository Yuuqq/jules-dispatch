# UAT Tasks for slide-skill v2.3 (Phases 31-33)
# Usage: npx tsx src/cli.ts batch tasks/slide-skill-uat

---
title: "UAT — Phase 31: Advanced Filter Effects (soft edge, glow, effectLst ordering)"
source: "sources/github/Yuuqq/slide-skill"
branch: "master"
prompt: |
  You are a QA tester performing acceptance testing on Phase 31 of the slide-skill project.

  ## Your Role
  Simulate a human tester. Do NOT just run existing unit tests — perform exploratory end-to-end verification as described below. Write a detailed report.

  ## Project Setup
  1. Install the package in dev mode:
     ```
     cd tools/slide && pip install -e ".[dev,pdf]"
     ```
  2. Verify pytest works:
     ```
     python -m pytest tests/test_filter_effects.py -v
     ```
     All 32 tests should pass.

  ## Requirements to Verify (from ROADMAP.md)

  **FE-01**: SVG with `feGaussianBlur` on `SourceAlpha` (no companion feOffset/feFlood) → exported PPTX contains `<a:softEdge rad="N"/>` with radius derived from `stdDeviation`

  **FE-02**: SVG with `feGaussianBlur` + `feFlood` + `feComposite` chain (no feOffset) → exported PPTX contains `<a:glow>` with color from feFlood and radius from the Gaussian blur

  **FE-03**: Shape with both glow and shadow effects has both `<a:glow>` and `<a:outerShdw>` in the same `<a:effectLst>`, ordered per XSD sequence (blur, fillOverlay, glow, innerShdw, outerShdw, prstShdw, reflection, softEdge)

  **FE-04**: SVG QA no longer flags `feFlood`, `feComposite`, or `feMerge` as banned tags

  **FE-05**: feFlood, feComposite, feMerge already in SUPPORTED_DRAWABLE_TAGS

  ## End-to-End Verification (CRITICAL — do all of these)

  ### Test A: Soft Edge
  Create a test SVG file `/tmp/test-soft-edge.svg`:
  ```xml
  <svg xmlns="http://www.w3.org/2000/svg" width="960" height="540">
    <defs>
      <filter id="soft1" x="-20%" y="-20%" width="140%" height="150%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      </filter>
    </defs>
    <rect x="100" y="100" width="400" height="200" fill="#3B82F6" filter="url(#soft1)"/>
  </svg>
  ```
  Run: `python -c "from slide_skill.exporter import render_pptx; render_pptx('/tmp/test-soft-edge.svg', '/tmp/test-soft-edge.pptx')"`
  Unzip the PPTX: `cd /tmp && python -c "import zipfile; zipfile.ZipFile('test-soft-edge.pptx').extractall('test-soft-edge-xml')"`
  Search for softEdge in the XML: `grep -r "softEdge" /tmp/test-soft-edge-xml/`
  **VERIFY**: `<a:softEdge rad=` is present with rad > 0.

  ### Test B: Glow Effect
  Create `/tmp/test-glow.svg`:
  ```xml
  <svg xmlns="http://www.w3.org/2000/svg" width="960" height="540">
    <defs>
      <filter id="glow1" x="-20%" y="-20%" width="140%" height="150%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
        <feFlood flood-color="#FF6B35" flood-opacity="0.6" result="color"/>
        <feComposite in="color" in2="blur" operator="in" result="glow"/>
        <feMerge>
          <feMergeNode in="glow"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <rect x="100" y="100" width="400" height="200" fill="#3B82F6" filter="url(#glow1)"/>
  </svg>
  ```
  Export and unzip same way. Search: `grep -r "glow" /tmp/test-glow-xml/`
  **VERIFY**: `<a:glow rad=` is present AND `<a:srgbClr val="FF6B35"/>` is inside it AND alpha matches 0.6.

  ### Test C: Glow + Shadow Coexistence
  Create `/tmp/test-glow-shadow.svg` with BOTH a glow chain and a drop shadow in the same filter applied to the same shape:
  ```xml
  <svg xmlns="http://www.w3.org/2000/svg" width="960" height="540">
    <defs>
      <filter id="glowShadow" x="-20%" y="-20%" width="140%" height="150%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
        <feFlood flood-color="#FF6B35" flood-opacity="0.6" result="color"/>
        <feComposite in="color" in2="blur" operator="in" result="glow"/>
        <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.25" result="shadow"/>
        <feMerge>
          <feMergeNode in="shadow"/>
          <feMergeNode in="glow"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <rect x="100" y="100" width="400" height="200" fill="#3B82F6" filter="url(#glowShadow)"/>
  </svg>
  ```
  Export and unzip as above.
  **VERIFY**: The same exported shape has one `<a:effectLst>` containing both `<a:glow>` and `<a:outerShdw>`. Testing glow and shadow on separate shapes does NOT satisfy FE-03.

  ### Test D: QA Tag Check
  Run: `python -c "from slide_skill.qa import run_qa; print('QA on glow SVG:'); run_qa('/tmp/test-glow.svg')"`
  **VERIFY**: No warnings about feFlood, feComposite, or feMerge being unsupported tags.

  ### Test E: XSD Ordering
  In the glow+shadow test, extract the effectLst XML and verify children appear in this order:
  blur → fillOverlay → glow → innerShdw → outerShdw → prstShdw → reflection → softEdge
  (Only the present ones matter, but they must be in this relative order.)

  ## Report
  Write a detailed UAT report to `.planning/phases/31-advanced-filter-effects/31-UAT-REPORT.md`:

  ```markdown
  # UAT Report: Phase 31 — Advanced Filter Effects
  **Tester:** Jules (AI QA Agent)
  **Date:** <today>

  ## Summary
  <PASS / FAIL / PARTIAL>

  ## Per-Requirement Results

  | Req | Description | Result | Evidence |
  |-----|-------------|--------|----------|
  | FE-01 | Soft edge → PPTX | PASS/FAIL | <what you found in XML> |
  | FE-02 | Glow → PPTX | PASS/FAIL | <what you found> |
  | FE-03 | XSD ordering | PASS/FAIL | <XML snippet> |
  | FE-04 | QA no banned tags | PASS/FAIL | <output> |
  | FE-05 | SUPPORTED_DRAWABLE_TAGS | PASS/FAIL | <checked code> |

  ## Issues Found
  <any bugs, unexpected behavior, or edge cases>

  ## Test Artifacts
  <list all generated files with paths>
  ```

  Commit the report file only. Do NOT modify any source code or existing tests.

