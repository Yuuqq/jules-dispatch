title: "UAT — Phase 33: PDF Handout Export (slides + notes as PDF)"
source: "sources/github/Yuuqq/slide-skill"
branch: "master"
prompt: |
  You are a QA tester performing acceptance testing on Phase 33 of the slide-skill project.

  ## Your Role
  Simulate a human tester verifying PDF handout export with slide thumbnails and speaker notes.

  ## Project Setup
  1. Install with PDF support:
     ```
     cd tools/slide && pip install -e ".[dev,pdf]"
     ```
  2. Run existing tests:
     ```
     python -m pytest tests/test_pdf_handout.py -v
     ```

  ## Requirements to Verify (from ROADMAP.md)

  **PD-01**: Running PDF handout command on a deck with speaker notes → multi-page PDF where each page has one slide thumbnail at top and speaker notes below

  **PD-02**: 2-up or 3-up layout → PDF arranges 2 or 3 smaller slide thumbnails per page with their respective notes

  **PD-03**: Speaker notes with bold, italic, and bullet lists render with corresponding formatting in PDF

  **PD-04**: Canvas presets (ppt169, xhs, wechat) automatically set correct page aspect ratio

  **PD-05**: Chinese speaker notes render correctly in PDF with embedded CJK font (Noto Sans SC or system font fallback)

  ## End-to-End Verification (CRITICAL)

  ### Test A: Basic 1-up PDF with Notes (PD-01)
  First, check how to invoke the PDF handout export:
  ```bash
  python -m slide_skill --help 2>/dev/null || python -c "from slide_skill.cli import main; main(['--help'])"
  ```
  Look for a `pdf-handout` or `handout` subcommand. If it exists, use it. Otherwise check `pdf_handout.py` module directly.

  Create a test deck with speaker notes. You can:
  1. Create a minimal PPTX file with 3 slides, each having speaker notes
  2. Or use an existing test fixture from the project

  Example using python-pptx:
  ```python
  from pptx import Presentation
  from pptx.util import Inches

  prs = Presentation()
  slides = [
      ("Introduction", [("Welcome to the presentation.", None), ("Point one", "bullet"), ("Point two", "bullet")]),
      ("Methodology", [("Bold method", "bold"), (" and ", None), ("italic approach", "italic"), ("Step 1", "bullet"), ("Step 2", "bullet")]),
      ("Results", [("中文笔记内容", None), ("结果一", "bullet"), ("结果二", "bullet")]),
  ]
  for title, notes in slides:
      slide = prs.slides.add_slide(prs.slide_layouts[1])
      slide.shapes.title.text = title
      notes_frame = slide.notes_slide.notes_text_frame
      notes_frame.clear()
      current_para = notes_frame.paragraphs[0]
      for text, style in notes:
          if style == "bullet":
              current_para = notes_frame.add_paragraph()
              current_para.text = text
              current_para.level = 0
              continue
          run = current_para.add_run()
          run.text = text
          if style == "bold":
              run.font.bold = True
          if style == "italic":
              run.font.italic = True
  prs.save('/tmp/test-handout.pptx')
  ```

  Generate PDF handout from this deck. Check the API:
  ```python
  from slide_skill.pdf_handout import generate_handout
  # or whatever the public API is — read pdf_handout.py to find out
  ```

  **VERIFY**:
  - PDF file is created and non-empty
  - PDF has 3 pages (one per slide)
  - Each page has a slide image/thumbnail and text below it
  - Page 1 contains "Welcome to the presentation"
  - Page 2 contains "Bold method" and "italic approach"
  - Page 3 contains "中文笔记内容"

  You can verify PDF content:
  ```python
  import subprocess
  # Extract text from PDF
  result = subprocess.run(['python', '-c', '''
  import fitz  # PyMuPDF if available
  doc = fitz.open("/tmp/test-handout.pdf")
  for i, page in enumerate(doc):
      print(f"--- Page {i+1} ---")
      print(page.get_text())
  '''], capture_output=True, text=True)
  # Or use fpdf2's built-in text extraction, or just check file size > 0
  ```

  ### Test B: 2-up Layout (PD-02)
  Generate PDF with 2-up layout (2 slides per page). Check available layout options in `pdf_handout.py`.
  ```python
  # Read the module to find layout parameter
  # Likely: Layout.TWO_UP or Layout(2) or similar
  ```
  **VERIFY**: PDF has fewer pages (2 slides fit on 1 page → 2 pages for 3 slides instead of 3).

  ### Test C: Formatted Notes (PD-03)
  From Test A's page 2 output, verify:
  - "Bold method" appears and was sourced from a PPTX run with `font.bold = True`
  - "italic approach" appears and was sourced from a PPTX run with `font.italic = True`
  - Bullet items "Step 1" and "Step 2" appear
  Check the PDF text output and inspect the PDF visually or structurally if the handout renderer exposes rich text spans. Plain Markdown markers like `**bold**` do NOT satisfy PD-03.

  ### Test D: Canvas Preset Aspect Ratios (PD-04)
  ```python
  from slide_skill.pdf_handout import _page_aspect
  # or check how canvas format affects page size
  for fmt in ['ppt169', 'xhs', 'wechat']:
      # Try each format and check resulting page dimensions
      print(f"{fmt}: aspect ratio = ...")
  ```
  **VERIFY**: ppt169 → 16:9 ratio, xhs → 3:4 (portrait), wechat → appropriate ratio.

  ### Test E: CJK Text in PDF (PD-05)
  From Test A's page 3, verify Chinese characters "中文笔记内容", "结果一", "结果二" are present.
  If the PDF contains garbled text or missing characters, that's a FAIL.

  ## Additional Exploratory Tests

  ### Test F: Empty Notes
  Create a slide with no speaker notes. Generate PDF handout.
  **VERIFY**: Page is created (with just the thumbnail), no crash.

  ### Test G: Long Notes
  Create a slide with very long speaker notes (500+ words).
  **VERIFY**: Notes don't overflow or get cut off (or if they do, it's noted as a limitation).

  ## Report
  Write to `.planning/phases/33-pdf-handout-export/33-UAT-REPORT.md`:

  ```markdown
  # UAT Report: Phase 33 — PDF Handout Export
  **Tester:** Jules (AI QA Agent)
  **Date:** <today>

  ## Summary
  <PASS / FAIL / PARTIAL>

