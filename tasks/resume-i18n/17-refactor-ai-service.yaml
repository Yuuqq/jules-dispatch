  `core/ai_service.py` is 2483 lines — the largest file in the project. Split it into focused sub-modules for maintainability.

  ## Task

  ### 1. Read `core/ai_service.py` completely

  Map all functions, classes, and constants. Identify logical groups.

  Expected groups:
  - **AIConfig + helpers** — `AIConfig`, `get_ai_config()`, `reset_ai_config()`, `_extract_usage_tokens()`
  - **Extraction** — `RESUME_EXTRACTION_PROMPT`, `extract_resume_from_text()`, `_parse_json_from_response()`, `_get_major_hint()`, `_get_template_resume()`, `_build_local_resume_fallback()`, `_return_local_resume_fallback()`
