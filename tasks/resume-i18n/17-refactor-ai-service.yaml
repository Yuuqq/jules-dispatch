  - **Job match** — `JOB_MATCH_ANALYSIS_PROMPT`, `analyze_job_match()`, `_get_default_match_analysis()`, `_return_default_match_analysis()`
  - **Polish** — `POLISH_RESUME_PROMPT`, `TARGETED_POLISH_PROMPT`, `polish_resume()`, `polish_resume_stream()`, `_consume_stream()`
  - **Diagnosis** — `RESUME_DIAGNOSIS_PROMPT`, `diagnose_resume()`, `diagnose_resume_stream()`
  - **Copilot** — `COPILOT_SYSTEM_PROMPT`, `generate_copilot_response()`
  - **Scoring** — `calculate_resume_score()`

  ### 2. Create sub-modules in `core/ai/`

  ```
  core/ai/
    __init__.py    — re-exports all public names for backward compatibility
    config.py      — AIConfig, get_ai_config, reset_ai_config, _extract_usage_tokens
    extraction.py  — extract_resume_from_text + helpers + prompts
    optimization.py — optimize_resume_section
    job_match.py   — analyze_job_match + helpers + prompts
    polish.py      — polish_resume, polish_resume_stream, _consume_stream + prompts
    diagnosis.py   — diagnose_resume, diagnose_resume_stream + prompts
    copilot.py     — generate_copilot_response + prompt
    scoring.py     — calculate_resume_score
  ```

