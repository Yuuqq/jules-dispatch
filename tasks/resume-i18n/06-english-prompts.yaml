      general_prompt = POLISH_RESUME_PROMPT_EN
      targeted_prompt = TARGETED_POLISH_PROMPT_EN
  else:
      general_prompt = POLISH_RESUME_PROMPT
      targeted_prompt = TARGETED_POLISH_PROMPT
  ```

  ### polish_resume_stream() — add `lang: str = "zh"` parameter
  Same prompt selection logic as polish_resume().

  ### diagnose_resume() and diagnose_resume_stream() — add `lang: str = "zh"`
  ```python
  prompt_template = RESUME_DIAGNOSIS_PROMPT_EN if lang == "en" else RESUME_DIAGNOSIS_PROMPT
  ```

  ### analyze_job_match() — add `lang: str = "zh"`
  ```python
  prompt_template = JOB_MATCH_ANALYSIS_PROMPT_EN if lang == "en" else JOB_MATCH_ANALYSIS_PROMPT
  ```

  ## Step 3: Add bilingual default suggestions

  Find where skill suggestions and default placeholder values are defined. Create bilingual versions:
  ```python
  DEFAULT_SKILL_SUGGESTIONS = {
      "zh": ["采访", "写作", "编辑", "摄影", "数据分析", "社交媒体运营"],
      "en": ["Interviewing", "Writing", "Editing", "Photography", "Data Analysis", "Social Media Management"],
  }
  ```

  Add a helper function:
  ```python
  def get_default_suggestions(lang: str = "zh") -> list:
      return DEFAULT_SKILL_SUGGESTIONS.get(lang, DEFAULT_SKILL_SUGGESTIONS["zh"])
  ```

  ## Important
  - ONLY modify `core/ai_service.py`
  - Keep ALL existing Chinese prompts exactly as-is (don't modify them)
  - English prompts should be professional, concise, and maintain the same JSON output schema
  - All function signatures are backward compatible (lang defaults to "zh")

