prompt: |
  ## Context
  Streamlit + Python resume builder. Phase 8 (UI i18n) is running in parallel.
  Your job: add English prompt variants and `lang` parameter routing to `core/ai_service.py`.

  ## Step 1: Add English prompt constants

  READ `core/ai_service.py` to find these existing Chinese prompt constants. Add English variants AFTER each one:

  ### 1.1 RESUME_EXTRACTION_PROMPT_EN (after RESUME_EXTRACTION_PROMPT)
  Same structure but instructions in English. Instruct AI to:
  - Extract resume data from English natural language input
  - Output English professional language (action verbs: Led, Managed, Developed, Achieved, etc.)
  - Use quantified results where possible
  - JSON field names stay English; VALUES become English
  - Keep same JSON schema as Chinese version

  ### 1.2 POLISH_RESUME_PROMPT_EN (after POLISH_RESUME_PROMPT)
  Same structure but optimization principles in English:
  - Quantify achievements
  - Use STAR method
  - Strong action verbs (Led, Spearheaded, Implemented, Optimized, etc.)
  - Industry keyword integration
  - Concise expression
  - Professional resume language

  ### 1.3 TARGETED_POLISH_PROMPT_EN (after TARGETED_POLISH_PROMPT)
  Same structure but targeted polish instructions in English:
  - JD keyword matching
  - Highlight relevant experience
  - Reorder skills by relevance
  - Quantify with specific numbers
  - STAR method
  - Action verbs relevant to the role
  - Optimize title for target position

  ### 1.4 RESUME_DIAGNOSIS_PROMPT_EN (after RESUME_DIAGNOSIS_PROMPT)
  Same JSON output schema but all labels/instructions in English:
  - Dimensions: Completeness, Professionalism, Quantification, Industry Relevance, Formatting
  - All feedback, issues, suggestions in English
  - Level labels: Excellent/Good/Fair/Needs Improvement

  ### 1.5 JOB_MATCH_ANALYSIS_PROMPT_EN (after JOB_MATCH_ANALYSIS_PROMPT)
  Same structure but analysis instructions in English.

  ### 1.6 COPILOT_SYSTEM_PROMPT_EN (after COPILOT_SYSTEM_PROMPT)
  Same role but in English. "You are the AI Career Advisor for CareerPoint AI Resume Builder..."

  ## Step 2: Add lang parameter to AI functions

