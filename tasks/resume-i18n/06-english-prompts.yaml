      user_input: str,
      major: str = "journalism",
      config: Optional[AIConfig] = None,
      requester: str = "",
      lang: str = "zh",   # NEW
  ) -> Tuple[Dict[str, Any], str]:
  ```
  In the function body, select prompt:
  ```python
  prompt_template = RESUME_EXTRACTION_PROMPT_EN if lang == "en" else RESUME_EXTRACTION_PROMPT
  ```
  Update the line that builds `full_prompt` to use `prompt_template` instead of `RESUME_EXTRACTION_PROMPT`.

  Also update the recursive calls (lines ~402 and ~432) to pass `lang=lang`.

  ### polish_resume() — add `lang: str = "zh"` parameter
  Select the correct prompt:
  ```python
