  ## Step 5: Update the 3 view files

  For each file (`views/resume_builder.py`, `views/cv_editor.py`, `views/cv_preview.py`):
  1. Add `from core.i18n import t` at top
  2. Replace EVERY Chinese string with t() call
  3. For f-strings: `f"已保存 {count} 个版本"` → `t("builder.saved_count", count=count)`
  4. Keep logic unchanged

  In `views/resume_builder.py` sidebar: add `from core.i18n import render_locale_toggle; render_locale_toggle(location="sidebar")`

