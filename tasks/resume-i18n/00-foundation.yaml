  ## Step 2: Create `core/i18n.py`

  ```python
  """Bilingual i18n module — locale management, string lookup, template labels, font configs."""
  import logging
  from typing import Dict, Optional

  import streamlit as st

  logger = logging.getLogger(__name__)

  LOCALE_ZH = "zh"
  LOCALE_EN = "en"
  DEFAULT_LOCALE = LOCALE_ZH

  def get_locale() -> str:
      """Read locale from st.session_state, default to LOCALE_ZH."""
      return st.session_state.get("locale", DEFAULT_LOCALE)

  def set_locale(locale: str) -> None:
      """Set locale in session state and persist to user config."""
      st.session_state["locale"] = locale
      try:
          from core.user_manager import get_user_manager
          user_session = st.session_state.get("user_session")
          if user_session and user_session.user.role not in ("guest",):
              mgr = get_user_manager()
              mgr.update_locale(user_session.user.user_id, locale)
      except Exception as e:
          logger.warning("Failed to persist locale: %s", e)

  def t(key: str, **kwargs) -> str:
      """Get translated UI string for current locale. Supports format kwargs."""
      from core.i18n_data import get_ui_strings
      strings = get_ui_strings()
      locale = get_locale()
      text = strings.get(locale, {}).get(key, key)
      if kwargs:
          try:
              return text.format(**kwargs)
          except (KeyError, IndexError):
              return text
      return text

  def get_template_labels(template_name: str) -> dict:
      """Get label dict for template in current locale. Falls back to 'modern'."""
      from core.i18n_data._templates import TEMPLATE_LABELS
      locale = get_locale()
      template_data = TEMPLATE_LABELS.get(template_name, TEMPLATE_LABELS.get("modern", {}))
      return template_data.get(locale, {})

  def get_font_config() -> dict:
      """Get font config dict for current locale."""
      from core.i18n_data._fonts import FONT_CONFIGS
      return FONT_CONFIGS.get(get_locale(), FONT_CONFIGS[DEFAULT_LOCALE])

  def render_locale_toggle(location: str = "sidebar") -> None:
      """Render language toggle widget.
      location: 'sidebar' — prominent selectbox in sidebar
                'landing' — small inline toggle on landing page
      """
      current = get_locale()
      options = {"中文": LOCALE_ZH, "English": LOCALE_EN}
      display = list(options.keys())
      idx = 0 if current == LOCALE_ZH else 1

      if location == "sidebar":
          selected = st.selectbox("🌐 Language", display, index=idx, key="_locale_sidebar")
      else:
          selected = st.selectbox("🌐 Language", display, index=idx, key="_locale_landing", label_visibility="collapsed")

      new_locale = options[selected]
      if new_locale != current:
          set_locale(new_locale)
          st.rerun()
  ```

  ## Step 3: Update `core/user_manager.py`

  - Add `locale: str = "zh"` field to the `User` dataclass (after `resume_versions`)
  - In `login()` method: after loading user data and creating UserSession, add:
    ```python
    import streamlit as st
    st.session_state["locale"] = user_data.get("locale", "zh")
    ```
  - Add method:
    ```python
    def update_locale(self, user_id: str, locale: str) -> bool:
        user_data = self._load_user_record(user_id)
        if not user_data:
            return False
        user_data["locale"] = locale
        self._users[user_id] = user_data
        return self._save_users()
    ```

