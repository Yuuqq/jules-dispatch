  ## Step 3: Update `app.py`

  Add at top: `from core.i18n import t, render_locale_toggle`

  Replace ALL Chinese strings with t() calls:
  - `"登录"` → `t("app.login")`
  - `f"已切换模板：{layout}"` → `t("app.template_switched", layout=layout)` (add key to _app.py)
