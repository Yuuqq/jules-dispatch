  ## Step 1: Create shared i18n infrastructure (identical to other parallel tasks)

  Create `core/i18n_data/__init__.py`:
  ```python
  """i18n string data — auto-discovers all _*.py modules."""
  from pathlib import Path
  from typing import Dict
  import importlib
  import pkgutil

  _ui_strings: Dict[str, Dict[str, str]] = {"zh": {}, "en": {}}
  _loaded = False

  def _load():
      global _loaded, _ui_strings
      if _loaded:
          return
      for module_info in pkgutil.iter_modules([str(Path(__file__).parent)]):
          if module_info.name.startswith("_"):
              try:
                  mod = importlib.import_module(f"core.i18n_data.{module_info.name}")
                  if hasattr(mod, "UI_STRINGS"):
                      for locale, strings in mod.UI_STRINGS.items():
                          _ui_strings.setdefault(locale, {}).update(strings)
              except Exception:
                  pass
      _loaded = True

  def get_ui_strings() -> Dict[str, Dict[str, str]]:
      _load()
      return _ui_strings
  ```

  Create `core/i18n.py`:
  ```python
  """Bilingual i18n module."""
  import logging
  from typing import Dict

  import streamlit as st

  logger = logging.getLogger(__name__)

  LOCALE_ZH = "zh"
  LOCALE_EN = "en"
  DEFAULT_LOCALE = LOCALE_ZH

  def get_locale() -> str:
      return st.session_state.get("locale", DEFAULT_LOCALE)

  def set_locale(locale: str) -> None:
      st.session_state["locale"] = locale
      try:
          from core.user_manager import get_user_manager
          user_session = st.session_state.get("user_session")
          if user_session and user_session.user.role not in ("guest",):
              mgr = get_user_manager()
              mgr.update_locale(user_session.user.user_id, locale)
      except Exception as e:
          logger.warning("Failed to persist locale: %s", e)

  def t(key: str, **kwargs) -> str:
      from core.i18n_data import get_ui_strings
      strings = get_ui_strings()
      locale = get_locale()
      text = strings.get(locale, {}).get(key, key)
      if kwargs:
          try:
              return text.format(**kwargs)
          except (KeyError, IndexError):
              return text
      return text

  def render_locale_toggle(location: str = "sidebar") -> None:
      current = get_locale()
      options = {"中文": LOCALE_ZH, "English": LOCALE_EN}
      display = list(options.keys())
      idx = 0 if current == LOCALE_ZH else 1
      key = f"_locale_{location}"
      if location == "sidebar":
          selected = st.selectbox("🌐 Language", display, index=idx, key=key)
      else:
          selected = st.selectbox("🌐 Language", display, index=idx, key=key, label_visibility="collapsed")
      new_locale = options[selected]
      if new_locale != current:
          set_locale(new_locale)
          st.rerun()
  ```

