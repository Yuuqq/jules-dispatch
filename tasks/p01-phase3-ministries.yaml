title: "[P3-T026] CAC (网信办) ministry scraper"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create two files for 网信办 (CAC) data collection:

  1. `scrapers/ministry_cac.py` — scraper for www.cac.gov.cn
     - class `CACScraper` with methods:
       - `list_regulations(keyword: str, page: int = 1) -> list[dict]` — search CAC site
       - `get_detail(url: str) -> dict | None` — parse regulation detail page
     - Extract: title, full_text, publish_date, document_number
     - Rate limiting (≥ 2s), retry on failure
     - Output matches schema/policy_document.json
     - Set source="网信办", doc_type based on content

  2. `scripts/collect_cac.py` — runner script
     - Keywords: 数据安全, 算法推荐, 生成式人工智能, 深度合成, 网络安全审查, 数据出境, 个人信息保护
     - Output to `data/ministry/cac/`
     - Checkpoint support
     - Print progress and summary

  Create the files and commit.
