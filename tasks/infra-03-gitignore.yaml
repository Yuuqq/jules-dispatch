  添加以下规则（如果不存在）：
  - __pycache__/
  - *.pyc
  - .env
  - data/cookies/
  - data/runs/
  - data/coded/
  - data/experiments/
  - data/final/
  - data/labeled/
  - data/models/
  - output/
  - *.parquet
  - .dispatch-logs/
  - vendor/jules-dispatch/node_modules/
  - paper2_companion_audit/output/
  - paper3_truth_fragmentation/output/

  注意：不要删除 .gitignore 中已有的规则，只追加缺失的。
