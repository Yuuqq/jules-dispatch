  3. `extract_keywords(text: str, config_keywords: list[str]) -> list[str]` — use jieba to segment text, then match against config keywords, return top 10 by frequency
  4. CLI: `python tools/auto_tagger.py --input <file> --output <file>`
  5. Print: domain distribution histogram, top keywords per domain

