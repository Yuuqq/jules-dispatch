  If the file is missing or essentially empty, implement from scratch:

  ```python
  """Auto-tag policy documents with domain labels and keywords."""
  ```

  Requirements:
  1. `load_configs(config_dir: str) -> dict[str, list[str]]` — load all configs/*.yaml, extract keywords_zh lists
  2. `tag_document(doc: dict, configs: dict) -> tuple[list[str], list[str]]` — returns (domains, keywords)
