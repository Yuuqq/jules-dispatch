  Phase 1: Exa API collection (NEW)
    - tasks/collect_exa_environmental.py
    - tasks/collect_exa_data_security.py
    - tasks/collect_exa_urban.py
    - tasks/collect_exa_commons.py
    - tasks/collect_exa_platform.py
    - tasks/collect_exa_ministries.py
    - Output: data/exa/*.json

  Phase 2: FLK collection (existing, but make optional)
  Phase 3: GOV.CN collection (existing, but make optional)
  Phase 4: Ministry collection (existing, but make optional)

  Phase 5: Merge all sources (NEW)
    - Read all JSON files from data/exa/, data/flk/, data/govcn/, data/ministry/
    - Normalize to common schema format
    - Save merged to data/merged/all_sources.json

  Phase 6: Deduplicate (existing)
  Phase 7: Clean text (existing)
  Phase 8: Extract metadata (existing)
  Phase 9: Auto-tag (existing)
  Phase 10: Link related docs (existing)
  Phase 11: Quality check (existing)
  Phase 12: Generate statistics (existing)
  Phase 13: Export final database (NEW)
    - Merge all processed data into data/final/policy_database.json
    - Format: {"metadata": {...}, "documents": [...]}
    - metadata includes: total_count, domains, date_range, sources
  ```

  ## CLI improvements

  Add arguments:
  - `--exa-only`: Only run Exa collection + processing (skip FLK/GOV.CN/ministry)
  - `--skip-exa`: Skip Exa collection
  - `--output-dir`: Custom output directory (default: data/final/)

  ## Error handling

  - Each phase failure logs error but continues (existing behavior, keep it)
  - At end, print summary: phases completed/failed/skipped, final document count
  - Save run_report.json with detailed per-phase status

  ## Merge logic (Phase 5 + Phase 13)

  Implement proper merge:
  ```python
  def merge_all_sources() -> list[dict]:
      """Read and normalize all source JSON files."""
      all_docs = []
      source_dirs = ["data/exa", "data/flk", "data/govcn", "data/ministry"]
      for src_dir in source_dirs:
          for json_file in Path(src_dir).rglob("*.json"):
              docs = normalize_to_schema(json_file)
              all_docs.extend(docs)
      return all_docs
  ```

  The `normalize_to_schema()` function should handle different input formats:
  - Exa format: {"results": [{...}]}
  - FLK format: list of dicts or {"data": [...]}
  - GOV.CN format: similar variations
  - Ministry format: similar variations

  ## Implementation notes

  - Keep the existing subprocess-based execution for individual scripts
  - Add the merge logic as native Python functions (not subprocess)
  - Ensure backward compatibility: `python scripts/run_all.py` still works as before
  - Add type hints and docstrings
  - Test: `python scripts/run_all.py --exa-only --skip-clean` should run without errors

