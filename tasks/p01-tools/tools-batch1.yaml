prompt: |
  Implement two CLI tools for the policy database project.

  ## Tool 1: `tools/validate.py`

  Replace the placeholder with a full implementation:

  ```python
  """Validate JSON data files against the policy document schema."""
  ```

  Requirements:
  1. Load schema from `schema/policy_document.json` using `jsonschema`
  2. CLI: `python tools/validate.py <file_or_directory>`
  3. For each record, validate against schema
  4. Print: total records, passed, failed
  5. For failed records: print index, field, error message
  6. Exit code: 0 if all pass, 1 if any fail
  7. Support both single JSON file and directory (recursively find *.json)
  8. Handle encoding: try UTF-8 first, fallback to GBK
  9. If schema file doesn't exist, print error and exit

  Add `jsonschema>=4.20.0` to requirements.txt if not present.

  ## Tool 2: `tools/quality_check.py`

  Replace the placeholder:

  ```python
  """Check data quality of collected policy documents."""
  ```

  Requirements:
  1. CLI: `python tools/quality_check.py <data_file.json>`
  2. Check each record for:
     - All 15 required fields present (list them)
     - full_text length >= 100 characters
     - publish_date format: YYYY-MM-DD (regex validate)
     - effective_date format: YYYY-MM-DD if present
     - doc_type in allowed enum values
     - status in allowed enum values
     - URL format valid if present
  3. Output: `reports/quality_report.json` with:
     - total_records
     - field_missing_rates: {field: percentage}
     - invalid_date_count
     - short_text_count (< 100 chars)
     - invalid_enum_count
     - overall_quality_score (0-1)
  4. Also print a terminal summary table
  5. Support directory input (aggregate across all JSON files)

  Create both files, update requirements.txt if needed, and commit.
  Include brief docstrings and type hints.
