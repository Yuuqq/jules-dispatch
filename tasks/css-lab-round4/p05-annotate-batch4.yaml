title: "P05: Annotate policy sentiment themes (batch 4 final)"
source: "sources/github/Yuuqq/css-lab-annotation-tool"
branch: "main"
prompt: |
  Final batch: annotate documents 1501-2045 from `../css-lab-policy-db/data/processed/normalized_all_policies.json`.

  Wait for batch 3 to be committed first, then:
  1. Read normalized_all_policies.json
  2. Skip first 1500 docs (already annotated)
  3. For docs 1501 onwards, apply same rule-based annotation:
     - governance_theme: 环境治理/数据安全/平台经济/城市治理/公地资源/公共安全/科学技术/农业/其他
     - policy_sentiment: 积极/限制/中性
     - target_sector: 企业/政府/个人/平台/金融机构/社会组织/混合
  4. Save as `data/annotated_policies_batch4.json`
  5. Merge ALL batches (1+2+3+4) into `data/annotated_all_policies.json`
  6. Generate summary stats: count by theme, sentiment, sector

  Commit: "feat: complete annotation for all 2045 docs + final merged file"
