title: "P05: Annotate policy sentiment themes (batch 2)"
source: "sources/github/Yuuqq/css-lab-annotation-tool"
branch: "main"
prompt: |
  Continue annotation for documents 501-1000 from `../css-lab-policy-db/data/processed/normalized_all_policies.json`.

  Wait for batch 1 to be committed first, then:
  1. Read normalized_all_policies.json
  2. Skip first 500 docs (already annotated in batch 1)
  3. For docs 501-1000, apply same rule-based annotation:
     - governance_theme: 环境治理/数据安全/平台经济/城市治理/公地资源/公共安全/科学技术/农业/其他
     - policy_sentiment: 积极/限制/中性
     - target_sector: 企业/政府/个人/平台/金融机构/社会组织/混合
  4. Save as `data/annotated_policies_batch2.json`
  5. Merge batch1 + batch2 into `data/annotated_all_policies.json`

  Commit: "feat: rule-based annotation batch 2 (docs 501-1000) + merged"
