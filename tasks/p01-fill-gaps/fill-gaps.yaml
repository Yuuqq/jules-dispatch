title: "[FILL-01] Missing ministries: MOHURD, MNR, SAMR via Exa"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Collect policy documents from 3 missing ministry sources using Exa API.

  These ministries have ZERO coverage in our current database. We need to fill this gap.

  Steps:
  1. `git pull origin main`
  2. `pip install exa-py>=2.0.0`
  3. Create and run a Python script:

  ```python
  import os, json, time
  from exa_py import Exa
  from pathlib import Path
  from datetime import datetime

  client = Exa(os.environ["EXA_API_KEY"])

  ministries = {
      "mohurd": {
          "label": "住房和城乡建设部",
          "queries": [
              "住房和城乡建设部 城市更新 办法 site:gov.cn",
              "住房和城乡建设部 物业管理 条例 site:gov.cn",
              "住房和城乡建设部 保障性住房 管理 site:gov.cn",
              "住房和城乡建设部 老旧小区改造 site:gov.cn",
              "住房和城乡建设部 建筑节能 标准 site:gov.cn",
              "住建部 房地产 管理 规定 site:gov.cn",
          ]
      },
      "mnr": {
          "label": "自然资源部",
          "queries": [
              "自然资源部 不动产登记 办法 site:gov.cn",
              "自然资源部 国土空间规划 规定 site:gov.cn",
              "自然资源部 土地管理 实施 条例 site:gov.cn",
              "自然资源部 矿产资源 管理 办法 site:gov.cn",
              "自然资源部 自然资源确权 site:gov.cn",
              "自然资源部 耕地保护 site:gov.cn",
          ]
      },
      "samr": {
          "label": "国家市场监督管理总局",
          "queries": [
              "市场监管总局 反垄断 规定 site:gov.cn",
              "市场监管总局 平台经济 管理 办法 site:gov.cn",
              "市场监管总局 消费者权益保护 site:gov.cn",
              "市场监管总局 数据安全 管理 site:gov.cn",
              "市场监管总局 互联网广告 管理 办法 site:gov.cn",
              "市场监管总局 食品安全 site:gov.cn",
          ]
      }
  }

  out_dir = Path("data/by_source/A_authoritative")
  out_dir.mkdir(parents=True, exist_ok=True)
  all_results = {}
  total = 0

  for key, cfg in ministries.items():
      results = []
      seen = set()
      for q in cfg["queries"]:
          try:
              resp = client.search(q, num_results=10, type="auto",
                  include_domains=["gov.cn"],
                  contents={"text": {"max_characters": 10000, "include_html_tags": False},
                            "highlights": {"query": q, "max_characters": 200}})
              for r in resp.results:
                  url = getattr(r, "url", "")
                  if url and url not in seen:
                      seen.add(url)
                      results.append({
                          "title": getattr(r, "title", ""),
                          "url": url,
                          "text": getattr(r, "text", ""),
                          "published_date": str(getattr(r, "published_date", "")),
                          "ministry": key,
                          "ministry_label": cfg["label"],
                          "collected_at": datetime.now().isoformat(),
                      })
              time.sleep(0.5)
          except Exception as e:
              print(f"  Error: {e}")
      all_results[key] = results
      total += len(results)
      print(f"  {cfg['label']}: {len(results)} records")

      with open(out_dir / f"{key}_govcn.json", "w", encoding="utf-8") as f:
          json.dump({"metadata": {"ministry": key, "label": cfg["label"], "count": len(results)},
                     "results": results}, f, ensure_ascii=False, indent=2)

  print(f"\nTotal: {total} records from 3 missing ministries")
  ```

  Run with: `EXA_API_KEY=<EXA_API_KEY> python <script>.py`
  Commit all output files.
