title: "[FILL-03] Historical policies 2015-2019 via Exa"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Collect historical policy documents from 2015-2019 to fill year coverage gap.

  Our database has ZERO records before 2020. Key laws and policies were enacted during 2015-2019 that are still in effect.

  Steps:
  1. `git pull origin main`
  2. `pip install exa-py>=2.0.0`
  3. Create and run a Python script:

  ```python
  import os, json, time
  from exa_py import Exa
  from pathlib import Path
  from datetime import datetime

  client = Exa(os.environ["EXA_API_KEY"])

  queries = [
      # 2015-2016 landmark laws
      "中华人民共和国国家安全法 2015 site:gov.cn",
      "中华人民共和国反恐怖主义法 2016 site:gov.cn",
      "中华人民共和国网络安全法 2016 site:gov.cn",
      "中华人民共和国慈善法 2016 site:gov.cn",
      "中华人民共和国境外非政府组织管理法 2016 site:gov.cn",
      # 2017-2018
      "中华人民共和国国家情报法 2017 site:gov.cn",
      "中华人民共和国环境保护税法 2016 2018 site:gov.cn",
      "国务院机构改革方案 2018 site:gov.cn",
      "电子商务法 2018 site:gov.cn",
      "土壤污染防治法 2018 site:gov.cn",
      "环境保护条例 2015 2016 2017 2018 2019 site:gov.cn",
      # 2019
      "中华人民共和国外商投资法 2019 site:gov.cn",
      "中华人民共和国疫苗管理法 2019 site:gov.cn",
      "中华人民共和国密码法 2019 site:gov.cn",
      "土地管理法 修正 2019 site:gov.cn",
      "城市房地产管理法 修正 2019 site:gov.cn",
      # Broad historical queries
      "国务院 法规 2015 site:gov.cn",
      "国务院 法规 2016 site:gov.cn",
      "国务院 法规 2017 site:gov.cn",
      "国务院 法规 2018 site:gov.cn",
      "国务院 法规 2019 site:gov.cn",
  ]

  out_dir = Path("data/by_source/A_authoritative")
  out_dir.mkdir(parents=True, exist_ok=True)
  results, seen = [], set()

  for q in queries:
      try:
          resp = client.search(q, num_results=10, type="auto",
              include_domains=["gov.cn"],
              start_published_date="2015-01-01",
              end_published_date="2019-12-31",
              contents={"text": {"max_characters": 10000, "include_html_tags": False},
                        "highlights": {"query": q, "max_characters": 200}})
          for r in resp.results:
              url = getattr(r, "url", "")
              if url and url not in seen:
                  seen.add(url)
                  results.append({
                      "title": getattr(r, "title", ""), "url": url,
                      "text": getattr(r, "text", ""),
                      "published_date": str(getattr(r, "published_date", "")),
                      "collected_at": datetime.now().isoformat(),
                      "collection_type": "exa_govcn_historical",
                  })
          time.sleep(0.5)
      except Exception as e:
          print(f"  Error: {e}")

  with open(out_dir / "historical_2015_2019_govcn.json", "w", encoding="utf-8") as f:
      json.dump({"metadata": {"period": "2015-2019", "count": len(results),
                                "collected_at": datetime.now().isoformat()},
                 "results": results}, f, ensure_ascii=False, indent=2)

  print(f"Collected {len(results)} historical records (2015-2019)")
  ```

  Run with: `EXA_API_KEY=<EXA_API_KEY> python <script>.py`
  Commit all output files.
