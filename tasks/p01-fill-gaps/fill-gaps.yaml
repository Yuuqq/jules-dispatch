title: "[FILL-04] NPC laws database — core legislation full texts"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Collect full texts of core Chinese legislation from NPC laws database and authoritative sources.

  Our "法律" category has 272 records but many are partial excerpts. This task targets the most important laws with full text retrieval.

  Steps:
  1. `git pull origin main`
  2. `pip install exa-py>=2.0.0`
  3. Create and run a Python script:

  ```python
  import os, json, time
  from exa_py import Exa
  from pathlib import Path
  from datetime import datetime

  client = Exa(os.environ["EXA_API_KEY"])

  # Core laws that MUST have full text in the database
  laws = [
      "中华人民共和国环境保护法 全文",
      "中华人民共和国环境影响评价法 全文",
      "中华人民共和国大气污染防治法 全文",
      "中华人民共和国水污染防治法 全文",
      "中华人民共和国土壤污染防治法 全文",
      "中华人民共和国固体废物污染环境防治法 全文",
      "中华人民共和国噪声污染防治法 全文",
      "中华人民共和国长江保护法 全文",
      "中华人民共和国黄河保护法 全文",
      "中华人民共和国数据安全法 全文",
      "中华人民共和国个人信息保护法 全文",
      "中华人民共和国网络安全法 全文",
      "中华人民共和国电子商务法 全文",
      "中华人民共和国城乡规划法 全文",
      "中华人民共和国水法 全文",
      "中华人民共和国森林法 全文",
      "中华人民共和国土地管理法 全文",
      "中华人民共和国矿产资源法 全文",
      "中华人民共和国反垄断法 全文",
      "中华人民共和国外商投资法 全文",
  ]

  out_dir = Path("data/by_source/A_authoritative")
  out_dir.mkdir(parents=True, exist_ok=True)
  results, seen = [], set()

  for q in laws:
      try:
          # Use larger max_characters for full text
          resp = client.search(q, num_results=5, type="auto",
              include_domains=["gov.cn", "npc.gov.cn"],
              contents={"text": {"max_characters": 30000, "include_html_tags": False},
                        "highlights": {"query": q, "max_characters": 500}})
          for r in resp.results:
              url = getattr(r, "url", "")
              if url and url not in seen:
                  seen.add(url)
                  results.append({
                      "title": getattr(r, "title", ""), "url": url,
                      "text": getattr(r, "text", ""),
                      "published_date": str(getattr(r, "published_date", "")),
                      "collected_at": datetime.now().isoformat(),
                      "collection_type": "exa_npc_fulltext",
                  })
          time.sleep(0.5)
      except Exception as e:
          print(f"  Error: {e}")

  with open(out_dir / "npc_core_laws_fulltext.json", "w", encoding="utf-8") as f:
      json.dump({"metadata": {"source": "npc_gov_cn", "count": len(results),
                                "collected_at": datetime.now().isoformat()},
                 "results": results}, f, ensure_ascii=False, indent=2)

  print(f"Collected {len(results)} core law full texts")
  ```

  Run with: `EXA_API_KEY=<EXA_API_KEY> python <script>.py`
  Commit all output files. Include count in commit message.
