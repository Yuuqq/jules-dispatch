title: "[P2-T012] Data security FLK collection script"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Create `scripts/collect_data_security_flk.py` — FLK collection script for data security domain.

  1. Load config from `configs/data_security.yaml` using PyYAML
  2. Import FLKCollector from `scrapers/flk_collector.py`
  3. For each keyword in keywords_zh, run collector.collect(keyword, category)
  4. Output to `data/flk/data_security/`
  5. Print progress: "[3/31] 数据安全 → found 8 results"
  6. On completion, merge all results into `data/flk/data_security/all_results.json`
  7. Print final summary: total unique documents collected

  Add `if __name__ == "__main__"` block.
  Add PyYAML to requirements.

  Create the file and commit.
