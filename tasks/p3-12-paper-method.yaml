title: "P3: 撰写研究设计与方法（中文）"
source: "sources/github/Yuuqq/llm-privacy-audit"
branch: "main"
prompt: |
  创建 paper3_truth_fragmentation/paper/sections/03_methodology.md

  中文论文，约 4000 字。

  内容：
  1. 研究设计概述（数字痕迹 + 事件史 + LLM 代理实验，三段式设计）
  2. 事件选择：3 个公共危机事件
     - E1：2024-09 台风摩羯登陆华南（自然灾害）
     - E2：2024-03 燕郊燃气爆炸（公共安全）
     - E3：2024-07 罐车食用油混装（食品安全）
     - 敏感性排除标准
  3. 数据采集：
     - 微博博文：每事件 3-5 万条（核心期 + 对照期）
     - 评论：每事件 top 1000 博文的评论
     - 总量约 15 万条
  4. Part A：AI 内容检测
     - 三通道融合（困惑度 + 风格特征 + LLM 投票）
     - AI 子类型分类（完全生成/改写/翻译/润色）
     - 人工校验：每事件 300 条双盲编码
  5. Part B：真相碎片化测度
     - 主题建模（BERTopic + 时间窗）
     - GTE/PTE 计算方法
     - Granger 因果检验
     - 崩解点检测
  6. Part C：LLM-as-Participant 信任实验
     - 10 种人格 × 10 副本 = 100 虚拟被试
     - 150 条刺激 × 15 条/人 = 1500 条判定
     - 测量：辨识准确率 + 信任分 + 线索词
  7. 信度与效度：人工编码 κ ≥ 0.70、检测器 AUC ≥ 0.85
  8. 伦理声明：数据匿名化、虚拟被试、无真人实验

  格式：GB/T 7714-2015，不用第一人称。
