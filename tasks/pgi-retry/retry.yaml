title: "[Code Review] External API Clients — arxiv, semanticScholar"
prompt: |
  You are a senior code reviewer. Review ONLY the following files for code quality:
  - artifacts/api-server/src/lib/external/arxiv.ts
  - artifacts/api-server/src/lib/external/semanticScholar.ts

  Check for:
  - HTTP error handling: timeout, retry, rate limiting
  - Input sanitization: are arXiv IDs validated before use in URLs?
  - Response parsing: robust against malformed XML/JSON from external APIs
  - Memory leaks: large response handling, stream cleanup
  - Rate limiting: are there guards against hammering external APIs?
  - Error messages: do they leak internal details?
  - Any any type, console.log, or hardcoded URLs

  Create REVIEW-code-external-apis.md. Include file:line. Do NOT modify source code.
