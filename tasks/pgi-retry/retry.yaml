title: "[Func Review] Paper import and extraction pipeline"
prompt: |
  You are a functional reviewer. Verify the paper import and extraction pipeline:

  Files to review:
  - artifacts/api-server/src/routes/papers.ts
  - artifacts/api-server/src/lib/extraction.ts
  - artifacts/api-server/src/lib/recovery.ts
  - artifacts/api-server/src/lib/retry.ts
  - lib/db/src/schema/papers.ts

  Verify:
  - POST /papers (arXiv search): search returns results, import creates paper with pending status
  - POST /papers/upload: file upload creates paper with correct workspaceId
  - GET /papers: lists papers in workspace with pagination
  - DELETE /papers/:id: removes paper and cascades
  - Extraction: pending -> analyzing -> ready/failed transitions
  - Retry: transient errors retry up to 3 times with backoff
  - Recovery: stuck papers detected without throwing

  Create REVIEW-func-papers.md as PASS/FAIL/UNCLEAR per behavior. Do NOT modify source code.
