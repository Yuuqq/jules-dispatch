title: "[DC-16] Collect international comparison data via Exa"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Run the Exa supplementary collection script and commit the results.

  Steps:
  1. Run: `pip install -r requirements.txt && python -c "
  from scrapers.exa_supplement import ExaSupplementaryCollector
  collector = ExaSupplementaryCollector()
  topics = ['GDPR', 'data protection law comparison', 'AI regulation international', 'algorithm governance']
  result = collector.collect(topics)
  print(f'Collected: {result}')
  "`
  2. If the Exa API keys don't work (they're hardcoded in exa_supplement.py), modify the script to accept keys from environment variable EXA_API_KEY, then set it to one of these keys and retry: <EXA_API_KEY>
  3. Commit ALL files under `data/exa_supplement/`
  4. Include document count in commit message
  5. If failed, commit `data/exa_supplement/FAILED.md` with explanation
