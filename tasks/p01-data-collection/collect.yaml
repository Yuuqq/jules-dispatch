# Data Collection Tasks — 16 tasks
# Each task runs a collection script and commits the data
---
title: "[DC-01] Collect data security laws from FLK"
source: "sources/github/Yuuqq/css-lab-policy-db"
branch: "main"
autoMode: "AUTO_CREATE_PR"
prompt: |
  Run the data security FLK collection script and commit the results.

  Steps:
  1. Run: `python scripts/collect_data_security_flk.py`
  2. If the script fails with import errors, run: `pip install -r requirements.txt` then retry
  3. If the script fails due to website changes, fix the scraper code in scrapers/flk_*.py to match the current HTML structure, then retry
  4. After successful run, commit ALL files under `data/flk/data_security/` (including any JSON files)
  5. In the commit message, include the count of documents collected
  6. If no data could be collected after fixing, commit a file `data/flk/data_security/FAILED.md` explaining what went wrong

  The collected data files MUST be committed. They are no longer in .gitignore.
